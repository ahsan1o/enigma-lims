<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Enigma LIMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <style>
    body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .nav-item.active { background-color: #2563eb !important; color: white !important; }
    @keyframes skelPulse { 0%,100%{opacity:.4} 50%{opacity:.7} }
    .skel { animation: skelPulse 1.5s ease infinite; background: #e2e8f0; border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes orbPulse { 0%,100%{opacity:.5} 50%{opacity:.8} }
    .fade-up { animation: fadeUp .5s ease forwards; }
    .orb { animation: orbPulse 6s ease infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Background orbs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="orb absolute -top-32 left-1/2 -translate-x-1/2 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
    <div class="orb absolute -bottom-32 -left-32 w-80 h-80 bg-indigo-700/10 rounded-full blur-3xl" style="animation-delay:3s;"></div>
    <div class="orb absolute top-1/3 -right-32 w-72 h-72 bg-blue-500/8 rounded-full blur-3xl" style="animation-delay:1.5s;"></div>
    <!-- Grid overlay -->
    <svg class="absolute inset-0 w-full h-full opacity-[0.025]" xmlns="http://www.w3.org/2000/svg">
      <defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#94a3b8" stroke-width="1"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
    </svg>
  </div>

  <div class="w-full max-w-md relative fade-up">

    <!-- Brand header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl shadow-2xl shadow-blue-600/40 mb-5">
        <i class="fas fa-flask text-white text-3xl"></i>
      </div>
      <h1 class="text-4xl font-bold text-gray-900 tracking-tight">Enigma <span class="text-blue-600">LIMS</span></h1>
      <p class="text-gray-500 text-sm mt-2">Modern Laboratory Management</p>
      <div class="inline-flex items-center gap-2 mt-3 px-3 py-1.5 bg-white border border-gray-200 rounded-full shadow-sm">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
        <span class="text-gray-500 text-xs">System Online</span>
      </div>
    </div>

    <!-- Login card -->
    <div class="bg-white rounded-2xl p-8 border border-gray-200 shadow-xl">
      <h2 class="text-gray-900 font-semibold text-lg mb-1 flex items-center gap-2">
        <i class="fas fa-lock text-blue-500 text-base"></i>
        Sign in to your account
      </h2>
      <p class="text-gray-400 text-xs mb-6">Enter your credentials to access the lab system</p>

      <!-- Error message -->
      <div id="errorMsg" class="hidden mb-5 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2">
        <i class="fas fa-exclamation-circle text-red-500 text-sm mt-0.5 flex-shrink-0"></i>
        <span id="errorText" class="text-red-600 text-sm"></span>
      </div>

      <form id="loginForm" class="space-y-4">
        <!-- Username -->
        <div>
          <label class="block text-gray-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Username</label>
          <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
              <i class="fas fa-user text-sm"></i>
            </div>
            <input
              type="text" id="username" placeholder="Enter your username" required autocomplete="username"
              class="w-full bg-white border border-gray-300 rounded-lg pl-10 pr-4 py-3 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-sm"
            >
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-gray-600 text-xs font-semibold uppercase tracking-wider mb-1.5">Password</label>
          <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
              <i class="fas fa-lock text-sm"></i>
            </div>
            <input
              type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"
              class="w-full bg-white border border-gray-300 rounded-lg pl-10 pr-12 py-3 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-sm"
            >
            <button type="button" id="togglePwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors p-1">
              <i class="fas fa-eye text-sm" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit" id="submitBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white py-3 rounded-lg font-semibold transition-all duration-200 flex items-center justify-center gap-2 mt-2 shadow-lg shadow-blue-600/30 text-sm"
        >
          <i class="fas fa-sign-in-alt" id="btnIcon"></i>
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <!-- Demo credentials -->
      <div class="mt-6 p-3.5 bg-gray-50 border border-gray-200 rounded-xl space-y-2">
        <p class="text-gray-500 text-xs font-semibold uppercase tracking-wide flex items-center gap-1.5">
          <i class="fas fa-circle-info text-blue-500"></i>
          Default Accounts
        </p>
        <div class="grid grid-cols-2 gap-x-4 gap-y-0.5 text-xs">
          <span class="text-blue-600 font-semibold col-span-2">Super Admin</span>
          <div class="flex items-center gap-1.5">
            <span class="text-gray-500">User:</span>
            <code class="text-gray-700 bg-gray-100 px-1.5 py-0.5 rounded font-mono">admin</code>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="text-gray-500">Pass:</span>
            <code class="text-gray-700 bg-gray-100 px-1.5 py-0.5 rounded font-mono">admin123</code>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-x-4 gap-y-0.5 text-xs">
          <span class="text-green-600 font-semibold col-span-2">Lab Technician</span>
          <div class="flex items-center gap-1.5">
            <span class="text-gray-500">User:</span>
            <code class="text-gray-700 bg-gray-100 px-1.5 py-0.5 rounded font-mono">tech</code>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="text-gray-500">Pass:</span>
            <code class="text-gray-700 bg-gray-100 px-1.5 py-0.5 rounded font-mono">tech123</code>
          </div>
        </div>
        <p class="text-amber-600 text-xs flex items-center gap-1 pt-0.5">
          <i class="fas fa-exclamation-triangle text-xs"></i>
          Change passwords after first login.
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-500 text-xs mt-6">
      &copy; 2024 Enigma LIMS &bull; v<span id="versionLabel">1.0.0</span>
    </p>
  </div>

  <script>
    // Set version
    document.getElementById('versionLabel').textContent = CONFIG.VERSION || '1.0.0';

    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    // Password toggle
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    function setError(msg) {
      const el = document.getElementById('errorMsg');
      if (msg) {
        document.getElementById('errorText').textContent = msg;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      const icon = document.getElementById('btnIcon');
      const text = document.getElementById('btnText');
      btn.disabled = on;
      btn.style.opacity = on ? '0.7' : '1';
      btn.style.cursor = on ? 'not-allowed' : 'pointer';
      icon.className = on ? 'fas fa-spinner fa-spin' : 'fas fa-sign-in-alt';
      text.textContent = on ? 'Signing in...' : 'Sign In';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { setError('Please enter both username and password.'); return; }

      setLoading(true);
      setError('');

      try {
        const data = await API.login(username, password);
        if (data && data.access_token) {
          Auth.setSession(data.access_token, data.user);
          window.location.href = 'dashboard.html';
        } else {
          setError('Invalid credentials. Please try again.');
        }
      } catch(e) {
        setError(e.message || 'Login failed. Please check your credentials.');
      } finally {
        setLoading(false);
      }
    });

    document.getElementById('username').focus();
  </script>
</body>
</html>
