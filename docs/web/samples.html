<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samples - Enigma LIMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .nav-item.active { background-color: #2563eb !important; color: white !important; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:50; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .tab-btn { padding:.4rem .9rem; border-radius:.5rem; font-size:.8rem; font-weight:500; cursor:pointer; border:1px solid #334155; background:transparent; color:#64748b; transition:all .2s; }
    .tab-btn.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .tab-btn:hover:not(.active) { background:#334155; color:#cbd5e1; }
    select option { background:#1e293b; color:#f1f5f9; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
          <i class="fas fa-flask text-white text-lg"></i>
        </div>
        <div>
          <div class="text-white font-bold text-base leading-tight">Enigma</div>
          <div class="text-blue-400 text-xs font-semibold tracking-widest">LIMS</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a href="dashboard.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-home w-5 text-center"></i><span>Dashboard</span></a>
      <a href="patients.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-users w-5 text-center"></i><span>Patients</span></a>
      <a href="samples.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-vial w-5 text-center"></i><span>Samples</span></a>
      <a href="tests.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-microscope w-5 text-center"></i><span>Tests</span></a>
      <a href="orders.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-clipboard-list w-5 text-center"></i><span>Orders</span></a>
      <a href="results.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-chart-bar w-5 text-center"></i><span>Results</span></a>
      <a href="reports.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-file-medical w-5 text-center"></i><span>Reports</span></a>
      <a href="instruments.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-cogs w-5 text-center"></i><span>Instruments</span></a>
      <a href="users.html" id="usersNav" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-all text-sm"><i class="fas fa-user-shield w-5 text-center"></i><span>Users</span></a>
    </nav>
    <div class="p-4 border-t border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" id="userAvatar">A</div>
        <div class="flex-1 min-w-0">
          <div class="text-white text-sm font-medium truncate" id="userName">Admin</div>
          <div class="text-slate-400 text-xs" id="userRole">Administrator</div>
        </div>
        <button onclick="Auth.logout()" class="text-slate-400 hover:text-red-400 transition-colors p-1" title="Logout">
          <i class="fas fa-sign-out-alt text-sm"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto">
    <div class="bg-slate-800 border-b border-slate-700 px-6 py-4 sticky top-0 z-30 flex items-center justify-between">
      <div>
        <h1 class="text-white font-bold text-xl">Samples</h1>
        <p class="text-slate-400 text-xs mt-0.5">Track and manage laboratory samples</p>
      </div>
      <button onclick="openRegisterModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 text-sm">
        <i class="fas fa-plus"></i> Register Sample
      </button>
    </div>

    <div class="p-6">
      <!-- Filter tabs -->
      <div class="flex items-center gap-2 mb-5 flex-wrap">
        <button class="tab-btn active" onclick="setFilter('',this)">All</button>
        <button class="tab-btn" onclick="setFilter('pending',this)">
          <span class="w-2 h-2 rounded-full bg-amber-400 inline-block mr-1.5"></span>Pending
        </button>
        <button class="tab-btn" onclick="setFilter('testing',this)">
          <span class="w-2 h-2 rounded-full bg-blue-400 inline-block mr-1.5"></span>Testing
        </button>
        <button class="tab-btn" onclick="setFilter('completed',this)">
          <span class="w-2 h-2 rounded-full bg-green-400 inline-block mr-1.5"></span>Completed
        </button>
        <button class="tab-btn" onclick="setFilter('approved',this)">
          <span class="w-2 h-2 rounded-full bg-purple-400 inline-block mr-1.5"></span>Approved
        </button>
        <span class="ml-auto text-slate-500 text-sm" id="sampleCount"></span>
      </div>

      <!-- Table -->
      <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-slate-700">
                <th class="px-5 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Sample ID</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Type</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Collected</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                <th class="px-4 py-3.5 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="samplesBody">
              <tr><td colspan="6" class="px-5 py-12 text-center text-slate-500 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>Loading samples...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- REGISTER SAMPLE MODAL -->
  <div id="registerModal" class="modal-overlay">
    <div class="bg-slate-800 rounded-2xl p-6 w-full max-w-lg border border-slate-700 shadow-2xl">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-bold text-lg">Register New Sample</h3>
        <button onclick="closeRegisterModal()" class="text-slate-500 hover:text-white transition-colors p-1"><i class="fas fa-times text-lg"></i></button>
      </div>
      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Patient <span class="text-red-400">*</span></label>
          <select id="rPatient" required class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm">
            <option value="">Select patient...</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Sample Type <span class="text-red-400">*</span></label>
          <select id="rType" required class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm">
            <option value="">Select type...</option>
            <option value="blood">Blood</option>
            <option value="serum">Serum</option>
            <option value="plasma">Plasma</option>
            <option value="urine">Urine</option>
            <option value="stool">Stool</option>
            <option value="csf">CSF (Cerebrospinal Fluid)</option>
            <option value="swab">Swab</option>
            <option value="sputum">Sputum</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Collection Date &amp; Time</label>
          <input type="datetime-local" id="rDate"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm">
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Notes</label>
          <textarea id="rNotes" placeholder="Collection notes, special instructions..." rows="3"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white placeholder-slate-400 focus:border-blue-500 focus:outline-none text-sm resize-none"></textarea>
        </div>
        <div id="registerError" class="hidden p-3 bg-red-900/40 border border-red-700/60 rounded-lg text-red-300 text-sm"></div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" onclick="closeRegisterModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">Cancel</button>
          <button type="submit" id="registerBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors text-sm flex items-center gap-2">
            <i class="fas fa-plus" id="registerBtnIcon"></i>
            <span id="registerBtnText">Register Sample</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- STATUS UPDATE MODAL -->
  <div id="statusModal" class="modal-overlay">
    <div class="bg-slate-800 rounded-2xl p-6 w-full max-w-md border border-slate-700 shadow-2xl">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-bold text-lg">Update Sample Status</h3>
        <button onclick="closeStatusModal()" class="text-slate-500 hover:text-white transition-colors p-1"><i class="fas fa-times text-lg"></i></button>
      </div>
      <div class="bg-slate-700/50 rounded-xl p-4 mb-4">
        <div class="text-xs text-slate-500 uppercase tracking-wider mb-1">Sample</div>
        <div class="font-mono text-blue-400 font-bold" id="statusSampleId">—</div>
        <div class="text-slate-300 text-sm mt-1" id="statusPatientName">—</div>
      </div>
      <div class="mb-4">
        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">New Status</label>
        <select id="newStatus" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none text-sm">
          <option value="pending">Pending</option>
          <option value="testing">Testing</option>
          <option value="completed">Completed</option>
          <option value="approved">Approved</option>
        </select>
      </div>
      <input type="hidden" id="statusSampleDbId">
      <div class="flex justify-end gap-3">
        <button onclick="closeStatusModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">Cancel</button>
        <button onclick="updateStatus()" id="statusBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors text-sm flex items-center gap-2">
          <i class="fas fa-check" id="statusBtnIcon"></i> Update Status
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <script>
    if (!Auth.requireAuth()) throw new Error('not logged in');

    document.querySelectorAll('.nav-item').forEach(link => {
      if (link.getAttribute('href') === 'samples.html') {
        link.classList.add('bg-blue-600', 'text-white');
        link.classList.remove('text-slate-300');
      }
    });

    const user = Auth.getUser();
    if (user) {
      document.getElementById('userName').textContent = user.full_name || user.username;
      document.getElementById('userRole').textContent = (user.role||'').charAt(0).toUpperCase()+(user.role||'').slice(1);
      document.getElementById('userAvatar').textContent = (user.full_name||user.username||'A').charAt(0).toUpperCase();
      if (user.role !== 'admin') document.getElementById('usersNav')?.classList.add('hidden');
    }

    function showToast(msg, type='success') {
      const colors={success:'bg-green-600',error:'bg-red-600',warning:'bg-amber-600',info:'bg-blue-600'};
      const icons={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
      const t = document.createElement('div');
      t.className = `pointer-events-all flex items-center gap-2.5 px-4 py-3 rounded-xl shadow-2xl text-white text-sm font-medium ${colors[type]||colors.info} border border-white/10`;
      t.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3500);
    }

    function statusBadge(s) {
      const map = {pending:['#f59e0b','#431407'],testing:['#3b82f6','#1e3a8a'],completed:['#22c55e','#052e16'],approved:['#a855f7','#2e1065']};
      const k = (s||'').toLowerCase();
      const [fg,bg] = map[k]||['#64748b','#1e293b'];
      const lbl = k.charAt(0).toUpperCase()+k.slice(1);
      return `<span style="display:inline-flex;align-items:center;padding:.2rem .65rem;font-size:.7rem;font-weight:600;border-radius:9999px;background:${bg};color:${fg};border:1px solid ${fg}44;">${lbl||'—'}</span>`;
    }

    function formatDateTime(d) {
      if (!d) return '—';
      try { return new Date(d).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
      catch(e){ return d; }
    }

    let allSamples = [];
    let currentFilter = '';

    async function loadPatients() {
      try {
        const data = await API.getPatients();
        const patients = Array.isArray(data) ? data : (data?.items || []);
        const sel = document.getElementById('rPatient');
        while (sel.options.length > 1) sel.remove(1);
        patients.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = `${p.full_name||p.name} (${p.age}y ${p.gender||''})`;
          sel.appendChild(opt);
        });
      } catch(e) { console.warn('Patients not loaded', e); }
    }

    async function loadSamples(filter='') {
      currentFilter = filter;
      document.getElementById('samplesBody').innerHTML = `<tr><td colspan="6" class="px-5 py-12 text-center text-slate-500 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>Loading...</td></tr>`;
      try {
        const data = await API.getSamples(filter);
        allSamples = Array.isArray(data) ? data : (data?.items || []);
        renderSamples(allSamples);
      } catch(e) {
        document.getElementById('samplesBody').innerHTML = `<tr><td colspan="6" class="px-5 py-12 text-center text-red-400 text-sm"><i class="fas fa-exclamation-circle mr-2"></i>${e.message}</td></tr>`;
        showToast('Failed to load samples', 'error');
      }
    }

    function renderSamples(samples) {
      document.getElementById('sampleCount').textContent = `${samples.length} sample${samples.length!==1?'s':''}`;
      if (!samples.length) {
        document.getElementById('samplesBody').innerHTML = `
          <tr><td colspan="6" class="px-5 py-16 text-center">
            <i class="fas fa-vial text-4xl text-slate-700 mb-3 block"></i>
            <p class="text-slate-400 font-medium">No samples found</p>
            <p class="text-slate-600 text-sm mt-1">Register your first sample to get started</p>
            <button onclick="openRegisterModal()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
              <i class="fas fa-plus mr-1"></i>Register Sample
            </button>
          </td></tr>`;
        return;
      }
      document.getElementById('samplesBody').innerHTML = samples.map(s => `
        <tr class="border-b border-slate-700/50 hover:bg-slate-700/20 transition-colors">
          <td class="px-5 py-3.5">
            <span class="font-mono text-blue-400 text-xs font-bold">${s.sample_id||s.id||'—'}</span>
          </td>
          <td class="px-4 py-3.5">
            <div class="text-white text-sm">${s.patient_name||s.patient?.full_name||'—'}</div>
          </td>
          <td class="px-4 py-3.5">
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-700 text-slate-300 capitalize">${s.sample_type||'—'}</span>
          </td>
          <td class="px-4 py-3.5 text-slate-400 text-xs">${formatDateTime(s.collection_date||s.created_at)}</td>
          <td class="px-4 py-3.5">${statusBadge(s.status)}</td>
          <td class="px-4 py-3.5">
            <button onclick='openStatusModal(${JSON.stringify(s)})' class="bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5">
              <i class="fas fa-edit"></i> Update Status
            </button>
          </td>
        </tr>`).join('');
    }

    function setFilter(filter, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadSamples(filter);
    }

    function openRegisterModal() {
      document.getElementById('registerForm').reset();
      document.getElementById('registerError').classList.add('hidden');
      // Set default date to now
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
      document.getElementById('rDate').value = local;
      document.getElementById('registerModal').classList.add('open');
    }
    function closeRegisterModal() { document.getElementById('registerModal').classList.remove('open'); }

    function openStatusModal(s) {
      document.getElementById('statusSampleId').textContent = s.sample_id || s.id || '—';
      document.getElementById('statusPatientName').textContent = s.patient_name || s.patient?.full_name || '—';
      document.getElementById('statusSampleDbId').value = s.id;
      document.getElementById('newStatus').value = s.status || 'pending';
      document.getElementById('statusModal').classList.add('open');
    }
    function closeStatusModal() { document.getElementById('statusModal').classList.remove('open'); }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('registerError');
      errEl.classList.add('hidden');

      const payload = {
        patient_id: parseInt(document.getElementById('rPatient').value),
        sample_type: document.getElementById('rType').value,
        collection_date: document.getElementById('rDate').value ? new Date(document.getElementById('rDate').value).toISOString() : new Date().toISOString(),
        notes: document.getElementById('rNotes').value.trim() || null
      };

      const btn = document.getElementById('registerBtn');
      const icon = document.getElementById('registerBtnIcon');
      btn.disabled = true; icon.className = 'fas fa-spinner fa-spin';

      try {
        await API.createSample(payload);
        showToast('Sample registered successfully');
        closeRegisterModal();
        loadSamples(currentFilter);
      } catch(err) {
        errEl.textContent = err.message || 'Failed to register sample';
        errEl.classList.remove('hidden');
      } finally { btn.disabled = false; icon.className = 'fas fa-plus'; }
    });

    async function updateStatus() {
      const id = document.getElementById('statusSampleDbId').value;
      const status = document.getElementById('newStatus').value;
      const btn = document.getElementById('statusBtn');
      const icon = document.getElementById('statusBtnIcon');
      btn.disabled = true; icon.className = 'fas fa-spinner fa-spin';
      try {
        await API.updateSampleStatus(id, status);
        showToast('Status updated');
        closeStatusModal();
        loadSamples(currentFilter);
      } catch(e) { showToast(e.message||'Update failed','error'); }
      finally { btn.disabled = false; icon.className = 'fas fa-check'; }
    }

    document.getElementById('registerModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeRegisterModal(); });
    document.getElementById('statusModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeStatusModal(); });

    loadPatients();
    loadSamples();
  </script>
</body>
</html>
